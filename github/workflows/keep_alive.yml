name: Keep PhysBot Alive

on:
  schedule:
    - cron: '0 */8 * * *'   # ping mỗi 8 tiếng
  workflow_dispatch:         # cho phép chạy tay trên GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping PhysBot API
        run: |
          echo "Pinging PhysBot at $(date)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://mtrung2222-physbot-api.hf.space/health)
          echo "Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Server is alive!"
          else
            echo "Server returned $STATUS — may be waking up"
          fi
